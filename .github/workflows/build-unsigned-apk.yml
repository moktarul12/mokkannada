name: Build Android APK and AAB

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Install Dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Clean Gradle Cache
        run: |
          cd android
          ./gradlew clean

      - name: Create Keystore
        run: |
          cd android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Set Signing Config
        run: |
          cd android
          echo "MYAPP_RELEASE_STORE_FILE=app/keystore.jks" >> gradle.properties
          echo "MYAPP_RELEASE_STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> gradle.properties
          echo "MYAPP_RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> gradle.properties
          echo "MYAPP_RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> gradle.properties

      - name: Build Signed APK
        run: |
          cd android
          ./gradlew assembleRelease --warning-mode all --info --stacktrace

      - name: Build Signed AAB
        run: |
          cd android
          ./gradlew bundleRelease --warning-mode all --info --stacktrace

      - name: Find Build Artifacts
        run: |
          find android/app/build -name "*.apk" -type f
          find android/app/build -name "*.aab" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/**/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: |
            android/app/build/outputs/bundle/release/*.aab
            android/app/build/outputs/bundle/**/*.aab
